<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPapa TTS Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; }
        #status { margin: 20px 0; padding: 10px; background: #f0f0f0; }
        audio { width: 100%; margin: 10px 0; }
        .log { font-family: monospace; font-size: 12px; white-space: pre-wrap; background: #222; color: #0f0; padding: 10px; }
    </style>
</head>
<body>
    <h1>🎤 OpenPapa TTS 測試</h1>
    
    <button onclick="testTTS()">🔊 測試 TTS</button>
    <button onclick="playAudio()">▶️ 播放聲音</button>
    
    <div id="status">狀態: 等待測試...</div>
    
    <audio id="audioPlayer" controls></audio>
    
    <h3>日誌:</h3>
    <div class="log" id="log"></div>
    
    <script>
        const TTS_URL = 'https://portfolio-tts-test-production.up.railway.app/tts';
        let audioBlob = null;
        
        function log(msg) {
            document.getElementById('log').textContent += msg + '\n';
        }
        
        async function testTTS() {
            const status = document.getElementById('status');
            status.textContent = '正在生成語音...';
            log('=== 開始測試 TTS ===');
            log('URL: ' + TTS_URL);
            
            try {
                log('發送請求到 MiniMax TTS API...');
                const response = await fetch(TTS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: '你好！我是 OpenPapa！呢個係測試語音！',
                        model: 'speech-2.8-hd',
                        voice: 'Chinese (Mandarin)_Cute_Spirit',
                        speed: 1,
                        emotion: 'happy'
                    })
                });
                
                log('Response status: ' + response.status);
                
                if (!response.ok) {
                    const error = await response.text();
                    log('Error: ' + error);
                    status.textContent = '錯誤: ' + error;
                    return;
                }
                
                log('收到音頻數據，轉換中...');
                audioBlob = await response.blob();
                log('音頻大小: ' + audioBlob.size + ' bytes');
                log('音頻類型: ' + audioBlob.type);
                
                const url = URL.createObjectURL(audioBlob);
                document.getElementById('audioPlayer').src = url;
                
                status.textContent = '✅ 語音生成成功！點擊播放';
                log('=== 測試完成 ===');
                
            } catch (err) {
                log('Error: ' + err.message);
                status.textContent = '錯誤: ' + err.message;
            }
        }
        
        function playAudio() {
            const player = document.getElementById('audioPlayer');
            if (player.src) {
                player.play();
                log('播放中...');
            } else {
                log('請先測試 TTS');
            }
        }
    </script>
</body>
</html>
