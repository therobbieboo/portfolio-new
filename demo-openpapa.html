<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPapa - 語音對話 Agent</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍👧</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #8888a0;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4aa, #00a885);
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .avatar.talking {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 212, 170, 0.5);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 212, 170, 0.5); }
            50% { box-shadow: 0 0 60px rgba(0, 212, 170, 0.8); }
        }
        
        .status {
            color: #00d4aa;
            font-size: 1rem;
            margin-bottom: 24px;
            min-height: 24px;
        }
        
        .btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #00d4aa, #00a885);
            color: #0a0a0f;
        }
        
        .btn-start:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(0, 212, 170, 0.3);
        }
        
        .btn-end {
            background: #ff4757;
            color: #fff;
        }
        
        .btn-end:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(255, 71, 87, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .transcript {
            margin-top: 32px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            padding: 16px;
            background: #0a0a0f;
            border-radius: 12px;
            display: none;
        }
        
        .transcript.show {
            display: block;
        }
        
        .transcript-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a3a;
        }
        
        .transcript-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .transcript-label {
            font-size: 0.75rem;
            color: #8888a0;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .transcript-text {
            color: #e8e8ed;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .transcript-text.user {
            color: #00d4aa;
        }
        
        .transcript-text.agent {
            color: #a855f7;
        }
        
        .wave {
            display: none;
            justify-content: center;
            gap: 4px;
            margin: 16px 0;
        }
        
        .wave.show {
            display: flex;
        }
        
        .wave span {
            width: 4px;
            height: 20px;
            background: #00d4aa;
            border-radius: 2px;
            animation: wave 0.5s infinite;
        }
        
        .wave span:nth-child(2) { animation-delay: 0.1s; }
        .wave span:nth-child(3) { animation-delay: 0.2s; }
        .wave span:nth-child(4) { animation-delay: 0.3s; }
        .wave span:nth-child(5) { animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { height: 20px; }
            50% { height: 40px; }
        }
        
        .error {
            color: #ff4757;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        
        .debug {
            margin-top: 16px;
            text-align: left;
            font-family: monospace;
            font-size: 0.75rem;
            color: #8888a0;
            background: #0a0a0f;
            padding: 8px;
            border-radius: 8px;
            max-height: 80px;
            overflow-y: auto;
            display: none;
        }
        
        .debug.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍👧 OpenPapa</h1>
        <p class="subtitle">溫暖的語音對話 Agent <span style="color:#555;font-size:0.7rem;">v2.4</span></p>
        
        <div class="avatar" id="avatar">👨</div>
        
        <div class="status" id="status">準備就緒，點擊開始對話</div>
        
        <div class="wave" id="wave">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        
        <button class="btn btn-start" id="startBtn" onclick="startCall()">🎤 開始對話</button>
        <button class="btn btn-end" id="endBtn" onclick="endCall()" style="display:none;">📴 結束對話</button>
        
        <div class="transcript" id="transcript"></div>
        <div class="error" id="error"></div>
        <div class="debug" id="debug"></div>
        
        <audio id="audioPlayer" style="display:none;"></audio>
    </div>
    
    <script>
        // MiniMax API Configuration
        const API_KEY = "sk-api-7-G6hmSns0tnEvGcvYemJOWLWBprC3NR2x3VYsf05ATa4Q3b52wTX4oNw7_slGKOmWI9W4ZFPqMsVGGxkmLz_LjikjreHqYF4gJu--YkLDsY_-kksoXGHh8";
        const GROUP_ID = "2015394789192643334";
        const TTS_URL = "https://portfolio-new-production-97a4.up.railway.app/tts";
        
        // State
        let isCallActive = false;
        let recognition = null;
        let conversationHistory = [];
        let isProcessing = false;
        let isSpeaking = false;
        let currentAudio = null;
        
        // Agent personality prompt
        const SYSTEM_PROMPT = `你是 OpenPapa，一個溫暖、体贴的父親角色AI助手。

你的特點：
- 說話親切、溫暖、有耐心
- 像一個關心子女的爸爸
- 聲音低沉、穩重、令人安心
- 會適時表達關心和鼓勵
- 回答簡潔有力，不囉嗦

請用繁體中文回答，語氣要像一個溫暖的父親。`;
        
        // Debug log
        function debug(msg) {
            console.log('[OpenPapa]', msg);
            const debugEl = document.getElementById('debug');
            debugEl.textContent = '[OpenPapa] ' + msg + '\n' + debugEl.textContent;
        }
        
        // Initialize speech recognition
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
            } else if ('SpeechRecognition' in window) {
                recognition = new SpeechRecognition();
            } else {
                showError('抱歉，您的瀏覽器不支援語音識別');
                return null;
            }
            
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-TW';
            
            recognition.onresult = async (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        await processUserInput(transcript);
                    }
                }
            };
            
            recognition.onerror = (event) => {
                if (event.error !== 'no-speech' && event.error !== 'aborted') {
                    debug('Speech error: ' + event.error);
                }
            };
            
            recognition.onend = () => {
                if (isCallActive && !isProcessing) {
                    try {
                        recognition.start();
                    } catch (e) {
                        debug('Recognition restart');
                    }
                }
            };
            
            return recognition;
        }
        
        // Process user input
        async function processUserInput(text) {
            if (!text.trim() || isProcessing) return;
            
            // Stop any current speech before processing new input
            stopSpeech();
            
            isProcessing = true;
            setStatus('思考中...');
            addToTranscript('user', text);
            
            try {
                // Add to conversation history
                conversationHistory.push({
                    role: 'user',
                    content: text
                });
                
                // Call MiniMax Chat API
                debug('Calling MiniMax Chat API...');
                const response = await fetch(`https://api.minimax.io/v1/text/chatcompletion_v2?GroupId=${GROUP_ID}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'MiniMax-M2.7',
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            ...conversationHistory
                        ],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });
                
                const data = await response.json();
                debug('Chat API response: ' + JSON.stringify(data).substring(0, 200));
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const agentResponse = data.choices[0].message.content;
                    
                    addToTranscript('agent', agentResponse);
                    
                    // Add to history
                    conversationHistory.push({
                        role: 'assistant',
                        content: agentResponse
                    });
                    
                    // Speak the response using MiniMax TTS via Railway
                    await speak(agentResponse);
                } else {
                    debug('Unexpected API response');
                    const errorMsg = '抱歉，爸爸現在有點累，回應出了點問題...';
                    addToTranscript('agent', errorMsg);
                    await speak(errorMsg);
                }
                
            } catch (error) {
                debug('Error: ' + error.message);
                showError('網路錯誤，請稍後再試');
                const errorResp = '網路連線有點問題，我們稍後再聊。';
                addToTranscript('agent', errorResp);
                await speak(errorResp);
            }
            
            setStatus('對話中...');
            isProcessing = false;
        }
        
        // Text to Speech using Railway TTS endpoint
        async function speak(text) {
            if (!isCallActive) return;
            
            debug('Speaking: ' + text.substring(0, 50) + '...');
            setStatus('爸爸說話中...');
            isSpeaking = true;
            
            try {
                const response = await fetch(TTS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        model: 'speech-2.8-hd',
                        voice: 'Chinese (Mandarin)_Cute_Spirit', // Warm male voice
                        speed: 1,
                        emotion: 'warm'
                    })
                });
                
                debug('TTS Response status: ' + response.status);
                
                if (!response.ok) {
                    throw new Error('TTS API error: ' + response.status);
                }
                
                // Get audio as blob
                const audioBlob = await response.blob();
                debug('Audio blob size: ' + audioBlob.size + ' bytes, type: ' + audioBlob.type);
                
                if (audioBlob.size === 0) {
                    throw new Error('Empty audio response');
                }
                
                // Create URL and play
                const audioUrl = URL.createObjectURL(audioBlob);
                const audioPlayer = document.getElementById('audioPlayer');
                
                // Stop any current audio
                if (currentAudio) {
                    currentAudio.pause();
                    URL.revokeObjectURL(currentAudio.src);
                }
                
                currentAudio = audioPlayer;
                audioPlayer.src = audioUrl;
                
                // Play and wait for it to finish
                await new Promise((resolve, reject) => {
                    audioPlayer.onended = resolve;
                    audioPlayer.onerror = reject;
                    audioPlayer.play().catch(reject);
                });
                
                debug('Speech finished');
                
            } catch (error) {
                debug('TTS Error: ' + error.message);
                console.error('TTS Error:', error);
            }
            
            isSpeaking = false;
            if (isCallActive) {
                setStatus('對話中...');
            }
        }
        
        // Stop current speech
        function stopSpeech() {
            const audioPlayer = document.getElementById('audioPlayer');
            audioPlayer.pause();
            if (currentAudio) {
                URL.revokeObjectURL(currentAudio.src);
                currentAudio = null;
            }
            isSpeaking = false;
        }
        
        // Start call
        function startCall() {
            isCallActive = true;
            conversationHistory = [];
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('endBtn').style.display = 'inline-block';
            document.getElementById('transcript').classList.add('show');
            document.getElementById('wave').classList.add('show');
            document.getElementById('avatar').classList.add('talking');
            document.getElementById('debug').classList.add('show');
            document.getElementById('error').textContent = '';
            document.getElementById('debug').textContent = '';
            
            setStatus('爸爸上線了，開始說話吧！');
            debug('Starting OpenPapa...');
            
            // Initialize and start speech recognition
            if (!recognition) {
                initSpeechRecognition();
            }
            
            if (recognition) {
                try {
                    recognition.start();
                    debug('Speech recognition started');
                } catch (e) {
                    debug('Recognition already started');
                }
            }
            
            // Welcome message
            const welcome = '嗨，孩子！爸爸在這裡陪你了。今天過得怎麼樣？';
            addToTranscript('agent', welcome);
            speak(welcome);
        }
        
        // End call
        function endCall() {
            isCallActive = false;
            
            if (recognition) {
                recognition.stop();
            }
            
            stopSpeech();
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('endBtn').style.display = 'none';
            document.getElementById('wave').classList.remove('show');
            document.getElementById('avatar').classList.remove('talking');
            
            setStatus('對話已結束');
            debug('Call ended');
        }
        
        // Add to transcript
        function addToTranscript(speaker, text) {
            const transcript = document.getElementById('transcript');
            const item = document.createElement('div');
            item.className = 'transcript-item';
            item.innerHTML = `
                <div class="transcript-label">${speaker === 'user' ? '👤 你' : '👨‍👧 OpenPapa'}</div>
                <div class="transcript-text ${speaker}">${text}</div>
            `;
            transcript.appendChild(item);
            transcript.scrollTop = transcript.scrollHeight;
        }
        
        // Set status
        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }
        
        // Show error
        function showError(text) {
            document.getElementById('error').textContent = text;
        }
    </script>
</body>
</html>
